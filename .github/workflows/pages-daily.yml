name: Daily Pages Deploy

# Replaces the Render deployment entirely: runs the pipeline directly on the
# Actions runner (scripts/ci_daily.py), snapshots every read-only endpoint the
# dashboard calls into static JSON, and publishes the single-file dashboard +
# those snapshots to GitHub Pages. The SQLite DB is persisted on the `ci-data`
# branch so forecast history / accuracy track record accumulate across runs.
# No always-on server -> the free-tier 750-hour Render limit no longer applies.
#
# Schedule (KST = UTC+9):
#   full AI cycles  07:40 / 13:00 / 20:00 KST   (07:40 also guarantees the daily report)
#   market refresh  every 2h                     (no AI tokens — FRED charts, indicators, news)

on:
  schedule:
    - cron: "40 22 * * *"    # 07:40 KST — full cycle + daily report
    - cron: "0 4 * * *"      # 13:00 KST — full cycle
    - cron: "0 11 * * *"     # 20:00 KST — full cycle
    - cron: "20 */2 * * *"   # every 2h  — market refresh (no AI)
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        type: choice
        options: [full, refresh, export]
        default: full

permissions:
  contents: write   # push the ci-data state branch
  pages: write
  id-token: write

concurrency:
  group: pages-daily
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DEV_MODE: "true"
      ALLOWED_IPS: "*"
      DATABASE_URL: "sqlite+aiosqlite:///${{ github.workspace }}/data/krw_watcher.db"
      MODEL_ID: claude-sonnet-4-6
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Resolve run mode
        id: mode
        run: |
          case "${{ github.event.schedule }}" in
            "20 */2 * * *") MODE=refresh ;;
            "")             MODE="${{ inputs.mode || 'full' }}" ;;
            *)              MODE=full ;;
          esac
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Run mode: $MODE"

      - uses: actions/checkout@v4

      - name: Restore DB from ci-data branch
        run: |
          mkdir -p data
          if git fetch origin ci-data --depth 1 2>/dev/null; then
            if git cat-file -e FETCH_HEAD:krw_watcher.db 2>/dev/null; then
              git show FETCH_HEAD:krw_watcher.db > data/krw_watcher.db
              echo "Restored DB: $(wc -c < data/krw_watcher.db) bytes"
            fi
          else
            echo "No ci-data branch yet — starting with a fresh DB"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline + export static site
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: python scripts/ci_daily.py

      - name: Persist DB to ci-data branch
        if: ${{ steps.mode.outputs.mode == 'full' }}
        run: |
          set -e
          STATE_DIR=$(mktemp -d)
          cp data/krw_watcher.db "$STATE_DIR/"
          cd "$STATE_DIR"
          git init -b ci-data -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add krw_watcher.db
          git commit -q -m "ci state $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" ci-data

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
